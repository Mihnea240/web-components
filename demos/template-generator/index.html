<!doctype html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Template Generator Promise List Demo</title>
	<style>
		:root {
			--bg: #f6f8fb;
			--surface: #ffffff;
			--border: #d8deea;
			--text: #1f2937;
			--muted: #64748b;
			--accent: #2563eb;
		}

		body {
			margin: 0;
			font-family: system-ui, -apple-system, sans-serif;
			background: var(--bg);
			color: var(--text);
		}

		.wrap {
			max-width: 760px;
			margin: 32px auto;
			padding: 0 16px;
		}

		.card {
			background: var(--surface);
			border: 1px solid var(--border);
			border-radius: 12px;
			padding: 18px;
			box-shadow: 0 10px 24px rgba(15, 23, 42, 0.06);
		}

		h1 {
			margin: 0 0 8px;
			font-size: 22px;
		}

		p {
			margin: 0 0 16px;
			color: var(--muted);
		}

		.controls {
			display: flex;
			gap: 8px;
			margin-bottom: 14px;
		}

		button {
			border: 1px solid var(--accent);
			background: var(--accent);
			color: #fff;
			border-radius: 999px;
			padding: 8px 14px;
			cursor: pointer;
			font-weight: 600;
		}

		button.secondary {
			border-color: var(--border);
			background: #fff;
			color: var(--text);
		}

		.rows {
			display: grid;
			gap: 10px;
		}

		.row {
			display: grid;
			grid-template-columns: 120px 1fr;
			gap: 12px;
			align-items: center;
			border: 1px solid var(--border);
			border-radius: 10px;
			background: #fff;
			padding: 10px 12px;
		}

		.pill {
			display: inline-flex;
			justify-content: center;
			align-items: center;
			border-radius: 999px;
			min-height: 26px;
			padding: 0 10px;
			font-size: 12px;
			font-weight: 700;
		}

		.pill.pending {
			background: #e0ecff;
			color: #1d4ed8;
		}

		.pill.ok {
			background: #dcfce7;
			color: #166534;
		}

		.pill.fail {
			background: #fee2e2;
			color: #991b1b;
		}

		.spinner {
			width: 12px;
			height: 12px;
			border: 2px solid rgba(29, 78, 216, 0.25);
			border-top-color: #1d4ed8;
			border-radius: 50%;
			display: inline-block;
			margin-right: 6px;
			animation: spin 0.9s linear infinite;
		}

		@keyframes spin {
			to {
				transform: rotate(360deg);
			}
		}
	</style>
</head>

<body>
	<main class="wrap">
		<section class="card">
			<h1>Promise List With Row Spinners</h1>
			<p>Each row has its own spawn context. Spinner rows are replaced when their promise resolves.</p>

			<div class="controls">
				<button id="run">Run Batch</button>
				<button id="clear" class="secondary">Clear</button>
			</div>

			<div id="rows" class="rows">
				<template-generator template="promise-row" placement="after">
					<!-- <span slot="lazy" class="pill pending"><span class="spinner"></span>PENDING</span> -->
				</template-generator>
			</div>
		</section>
	</main>

	<script type="module" src="./main.ts"></script>
</body>

</html>
