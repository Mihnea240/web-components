<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>List View Demo</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 32px;
            font-family: system-ui, sans-serif;
            background: #f4f4f5;
            color: #18181b;
        }

        .panes {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            max-width: 900px;
            margin: 0 auto;
        }

        list-view {
            display: block;
            height: 500px;
            overflow: auto;
            border: 1px solid #d4d4d8;
            background: #ffffff;
            padding: 16px;
            
            overflow-y: scroll;
            scrollbar-gutter: stable;
        }

        list-view>div {
            height: 48px;
            padding: 8px 16px;
            margin-bottom: 8px;
            border: 1px solid #e4e4e7;
            background: #fafafa;
            display: flex;
            align-items: center;
            gap: 12px;

            transition: all 0.2s ease;
        }

        .demo-item {
            width: 100%;
            user-select: none;
            cursor: grab;
        }

        .demo-item:active {
            cursor: grabbing;
        }

        .meta {
            margin-left: auto;
            color: #71717a;
            font-size: 14px;
        }

        /* Drag States */
        .drag-over {
            background: #e0f2fe;
        }

        .drag-before {
            /* border-top: 2px solid #0284c7; */
            margin-top: 48px;
        }   

        .drag-after {
            /* border-bottom: 2px solid #0284c7; */
            margin-bottom: 48px;
        }

        .dragging {
            height: 0 !important;
            min-height: 0 !important;
            padding: 0 !important;
            margin: 0 !important;
            border: none !important;
            overflow: hidden;
        }

        /* list-view[dropping]>div.drag-over {
            transition: none !important;
        } */
    </style>
</head>

<body>
    <div class="panes">
        <list-view id="source-list">
            <template-generator slot="template" template="list-view:custom-demo"></template-generator>
        </list-view>

        <list-view id="target-list">
            <template-generator slot="template" template="list-view:custom-demo"></template-generator>
        </list-view>
    </div>
    <script type="module" src="./main.ts"></script>
</body>

</html>
